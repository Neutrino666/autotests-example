services:

  selenoid:
    container_name: selenoid
    image: adtechqatools/selenoid:latest-release
    platform: linux/${ARCH}
    volumes:
      - ./selenoid:/etc/selenoid
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Moscow
    restart: unless-stopped
    command: [ "-conf", "/etc/selenoid/browsers.json", "-limit", "3", "-video-output-dir", "/opt/selenoid/video", "-log-output-dir", "/opt/selenoid/logs", "-container-network", "autotests-example_service-network" ]
    ports:
      - 4444:4444
    networks:
      - service-network

  selenoid-ui:
    container_name: selenoid-ui
    image: aerokube/selenoid-ui:1.10.11
    depends_on:
      - selenoid
    restart: unless-stopped
    ports:
      - 9091:8080
    command: [ "--selenoid-uri", "http://selenoid:4444" ]
    networks:
      - service-network
  
  allure-serve:
    container_name: allure-server.dc
    image: kochetkovma/allure-server:2.13.9
    volumes:
      - allure-results:/app/allure-results
    ports:
      - 8081:8080

networks:
  service-network:
    driver: bridge

volumes:
  allure-results:
    external: true